name: Peak Hour Collection

on:
  schedule:
    # AM Peak — 08:00 IST = 02:30 UTC
    - cron: '30 2 * * 1-6'
    # PM Peak — 17:00 IST = 11:30 UTC
    - cron: '30 11 * * 1-6'
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCS credentials
        run: |
          echo '${{ secrets.GCS_CREDENTIALS_JSON }}' > gcs_key.json

      - name: Run collection
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: python run_dashboard.py

      - name: Clean up credentials
        if: always()
        run: rm -f gcs_key.json
